on:
  workflow_dispatch:

jobs:
  build-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pandoc and LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc librsvg2-bin lmodern \
            texlive-latex-recommended texlive-latex-extra

      - name: Build PDF
        run: |
          cd docs
          pandoc [0-9]*-*/index.md \
            -f markdown-implicit_figures \
            --resource-path=$(echo [0-9]*-* | tr ' ' ':') \
            --toc \
            --number-sections \
            --metadata title=Documentazione \
            -V geometry:margin=1in \
            -o ../output.pdf 

      - uses: actions/upload-artifact@v5
        with:
          name: documentation-pdf
          path: output.pdf