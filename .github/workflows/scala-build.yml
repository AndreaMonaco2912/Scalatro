on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-jar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup JDK
        uses: actions/setup-java@v6
        with:
          distribution: temurin
          java-version: "25"
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Build assembly JAR
        run: sbt assembly

      - name: Collect jar
        run: |
          mkdir -p out
          cp target/scala-*/*.jar out/

      - uses: actions/upload-artifact@v7
        with:
          name: scalatro-jar
          path: target/scala-*/*.jar
